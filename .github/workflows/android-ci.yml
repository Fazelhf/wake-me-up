# Builds the debug APK and runs unit tests on every push/PR.
# The APK is uploaded as a workflow artifact (Actions tab -> run -> Artifacts).
name: Android CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Build signed release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wakemethere-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: wakemethere-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/
